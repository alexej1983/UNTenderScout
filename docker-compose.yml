services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # mounted when SSL is set up
      - certbot-www:/var/www/certbot:ro      # for Let's Encrypt challenges
    depends_on:
      - app
    networks:
      - web

volumes:
  certbot-www:

networks:
  web:

# Cloudflare Pages – Functions configuration
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# NOTE: pages_build_output_dir is intentionally NOT set here.
# When deploying via the Cloudflare dashboard (Git-connected project), set:
#   Build output directory → static
# in Pages → your project → Settings → Builds & deployments.
# Putting pages_build_output_dir in wrangler.toml causes `wrangler deploy`
# (a Workers command) to be invoked instead of `wrangler pages deploy`,
# which produces the "wrong command" error.

name = "untenderscout"

# Use a recent compatibility date to get modern Workers APIs.
compatibility_date = "2024-09-23"

# ---------------------------------------------------------------------------
# Adding your API key
# ---------------------------------------------------------------------------
# Production (Cloudflare dashboard):
#   Pages → your project → Settings → Environment Variables → Add variable
#   Variable name : ANTHROPIC_API_KEY
#   Value         : sk-ant-...
#   Then redeploy.
#
# Local development (`wrangler pages dev`):
#   cp .dev.vars.example .dev.vars
#   # edit .dev.vars and paste your real key
#   wrangler pages dev static --compatibility-date=2024-09-23
# ---------------------------------------------------------------------------
